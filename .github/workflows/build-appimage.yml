name: Build Papers AppImage

on:
  workflow_dispatch:

env:
  MESON_BUILD_DIR: _build
  APP_DIR: AppDir

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:rawhide

    steps:
      # Restore dnf cache first so ALL dnf commands benefit, including git install.
      # Key is static (no hashFiles) because we cannot checkout before git exists.
      - name: Cache dnf packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: dnf-v1
          restore-keys: |
            dnf-

      # Container (fedora:rawhide) starts without git.
      # Install git FIRST so checkout can clone with submodules.
      - name: Install git into container
        run: |
          dnf install -y --setopt=metadata_expire=86400 git 2>/dev/null || microdnf install -y git

      - name: Checkout (without submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git submodule init
          git submodule update --checkout

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Cache meson build
        uses: actions/cache@v4
        with:
          path: ${{ env.MESON_BUILD_DIR }}
          key: meson-${{ github.sha }}
          restore-keys: |
            meson-${{ github.ref }}-
            meson-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.sha }}
          restore-keys: |
            ccache-${{ github.ref }}-
            ccache-

      - name: Install build dependencies
        run: |
          dnf install -y --skip-unavailable --setopt=metadata_expire=86400 \
            meson appstream cairo-devel clippy dbus-devel \
            desktop-file-utils djvulibre-devel exempi-devel \
            gi-docgen glib2-devel gobject-introspection-devel \
            gsettings-desktop-schemas-devel gtk4-devel itstool \
            libadwaita-devel libarchive-devel libsass-devel \
            libsecret-devel libtiff-devel nautilus-devel \
            poppler-glib-devel yelp-tools zlib-devel \
            rust rustfmt cargo blueprint-compiler \
            libspelling-devel gdk-pixbuf2-devel \
            patchelf wget which file ccache

      - name: Install appimagetool
        run: |
          dnf install -y --setopt=metadata_expire=86400 squashfs-tools
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          cd /tmp
          /tmp/appimagetool --appimage-extract
          mv squashfs-root /opt/appimagetool
          ln -sf /opt/appimagetool/AppRun /usr/local/bin/appimagetool

      - name: Build gir (Rust FFI bindings generator)
        run: |
          cargo install --path rust/gir
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Meson setup
        run: |
          export CC="ccache gcc"
          export CXX="ccache g++"
          if [ -d "$MESON_BUILD_DIR" ]; then
            meson setup --reconfigure "$MESON_BUILD_DIR" \
              --prefix=/usr \
              --libdir=lib64 \
              -Dbuildtype=release \
              -Dnautilus=false \
              -Dthumbnailer=true \
              -Ddocumentation=false \
              -Dintrospection=disabled \
              -Duser_doc=false \
              -Dtests=false \
              -Dprofile=default
          else
            meson setup "$MESON_BUILD_DIR" \
              --prefix=/usr \
              --libdir=lib64 \
              -Dbuildtype=release \
              -Dnautilus=false \
              -Dthumbnailer=true \
              -Ddocumentation=false \
              -Dintrospection=disabled \
              -Duser_doc=false \
              -Dtests=false \
              -Dprofile=default
          fi

      - name: Compile
        run: |
          export CC="ccache gcc"
          export CXX="ccache g++"
          meson compile -C $MESON_BUILD_DIR

      - name: Install to AppDir
        run: |
          DESTDIR=$PWD/$APP_DIR meson install -C $MESON_BUILD_DIR
          # Meson default prefix fallback: /usr/local → /usr
          if [ -d "$APP_DIR/usr/local" ]; then
            cp -a "$APP_DIR/usr/local/"* "$APP_DIR/usr/"
            rm -rf "$APP_DIR/usr/local"
          fi

      - name: Bundle dependencies
        run: bash .github/workflows/bundle-deps.sh $APP_DIR

      - name: Create AppImage
        run: |
          appimagetool -n --comp gzip \
            "$APP_DIR" \
            "Papers-$(date +%Y%m%d)-x86_64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Papers-x86_64-AppImage
          path: Papers-*.AppImage
          if-no-files-found: error
