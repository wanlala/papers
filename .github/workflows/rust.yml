name: Rust

on:
  workflow_dispatch: 

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install libgtk-4-dev -y
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
